name: Version Bump Backport

on:
  pull_request:
    types: [closed]
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  backport:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master'
    runs-on: ubuntu-latest
    steps:
      - name: Detect version bump
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const labels = pr.labels.map(l => l.name.toLowerCase());

            // Check author or label
            if (author === 'updatecli[bot]' || labels.some(l => l.includes('updatecli'))) {
              core.setOutput('is_version_bump', 'true');
              return;
            }

            // Check files changed — paginate to get all changed files
            const versionFiles = /^(scripts\/version\.sh|Dockerfile(\.windows)?|go\.mod|charts\/.*)$/;
            let page = 1;
            let allVersionFiles = true;
            while (true) {
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
                page,
              });
              if (files.length === 0) break;
              if (files.some(f => !versionFiles.test(f.filename))) {
                allVersionFiles = false;
                break;
              }
              if (files.length < 100) break;
              page++;
            }
            core.setOutput('is_version_bump', allVersionFiles ? 'true' : 'false');

      - name: Checkout repository
        if: steps.detect.outputs.is_version_bump == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cherry-pick to release branches
        if: steps.detect.outputs.is_version_bump == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          RELEASE_BRANCHES="release-1.35 release-1.34 release-1.33"

          for RELEASE_BRANCH in $RELEASE_BRANCHES; do
            echo "--- Processing $RELEASE_BRANCH ---"

            # Check if the branch exists on the remote
            if ! git ls-remote --exit-code --heads origin "$RELEASE_BRANCH" > /dev/null 2>&1; then
              echo "Branch $RELEASE_BRANCH does not exist, skipping."
              continue
            fi

            BACKPORT_BRANCH="backport-${PR_NUMBER}-${RELEASE_BRANCH}"

            # Clean up any existing local branch
            git branch -D "$BACKPORT_BRANCH" 2>/dev/null || true

            # Create backport branch from the release branch
            git checkout -b "$BACKPORT_BRANCH" "origin/$RELEASE_BRANCH"

            # Cherry-pick the merge commit (-m 1 handles merge commits)
            if ! git cherry-pick -x -m 1 "$MERGE_SHA"; then
              echo "Cherry-pick failed for $RELEASE_BRANCH (likely a conflict), skipping."
              git cherry-pick --abort 2>/dev/null || true
              git checkout -
              git branch -D "$BACKPORT_BRANCH" 2>/dev/null || true
              continue
            fi

            # Push the backport branch
            git push origin "$BACKPORT_BRANCH"

            # Create the pull request
            PR_BODY="Backport of #${PR_NUMBER} to \`${RELEASE_BRANCH}\`."$'\n\n'"Automated cherry-pick of merge commit \`${MERGE_SHA}\`."
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base "$RELEASE_BRANCH" \
              --head "$BACKPORT_BRANCH" \
              --title "[backport ${RELEASE_BRANCH}] ${PR_TITLE}" \
              --body "$PR_BODY"

            echo "Created backport PR for $RELEASE_BRANCH"
            git checkout -
          done
